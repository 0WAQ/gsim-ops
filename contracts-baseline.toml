# 有存量违例、走 ratchet 基线的 import 契约(C2/C3)。
# CI 用 scripts/ci/import_baseline.py 断言违例数只降不升;清零后把契约
# 移入 pyproject [tool.importlinter](enforcing)并删除本文件对应段。
# 基线实测:2026-07-09,factor-aggregate-plan §2.3(C2=18;C3 已于阶段 2 清零转 enforcing)。
[tool.importlinter]
root_package = "ops"
include_external_packages = true
exclude_type_checking_imports = true

[[tool.importlinter.contracts]]
name = "C2 cli must not import infra or core (directly)"
type = "forbidden"
allow_indirect_imports = true
source_modules = ["ops.cli"]
forbidden_modules = ["ops.infra", "ops.core"]
