[project]
name = "ops"
version = "0.1.1"
description = "Gsim Operations Tool"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "argparse>=1.4.0",
    "lxml>=6.0.2",
    "numpy>=2.2.6",
    "pandas>=2.3.3",
    "paramiko>=4.0.0",
    "scp>=0.15.0",
    "setuptools>=80.9.0",
    "tqdm>=4.67.1",
    "wheel>=0.45.1",
]

[project.scripts]
ops = "ops.main:main"