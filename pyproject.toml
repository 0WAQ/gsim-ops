[project]
name = "ops"
version = "0.1.1"
description = "Gsim Operations Tool"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "argparse>=1.4.0",
    "boto3>=1.43.16",
    "colorama>=0.4.6",
    "loguru>=0.7.2",
    "lxml>=6.0.2",
    "lxml-stubs>=0.5.1",
    "mlflow>=3.13.0",
    "numpy>=2.2.6",
    "pandas>=2.3.3",
    "paramiko>=4.0.0",
    "psycopg-pool>=3.3.1",
    "psycopg[binary]",
    "pyyaml>=6.0.3",
    "redis>=8.0.0",
    "requests>=2.32.5",
    "rich>=15.0.0",
    "scp>=0.15.0",
    "setuptools>=80.9.0",
    "tqdm>=4.67.1",
    "wheel>=0.45.1",
    "xmltodict>=1.0.2",
    "zstandard>=0.25.0",
]

[project.scripts]
ops = "ops.main:main"

[dependency-groups]
dev = [
    "pytest>=8",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
filterwarnings = [
    # psycopg ConnectionPool.__del__ 在 GC 时试图 join 自己的 worker 线程,
    # 短命 store pool (每测新建) 触发无害的 unraisable 噪音。生产是长命进程不涉及。
    "ignore::pytest.PytestUnraisableExceptionWarning",
]
markers = [
    "pg: 需要可达的 ops_test Postgres 库 (host 10.9.100.160:15432); 库不可达时自动 skip",
    "slow: 真跑 gsim 的端到端测试 (慢, 默认不跑)",
    "e2e: 端到端测试 (真实 gsim + cc 数据); 环境不可达时自动 skip",
]

[tool.setuptools.packages.find]
include = ["ops*"]
