[project]
name = "ops"
version = "0.1.1"
description = "Gsim Operations Tool"
readme = "README.md"
requires-python = ">=3.10"
# 2026-07-07 依赖大扫除(full-review 第三部分 §五):删除从未 import 的
# mlflow/pandas/lxml/lxml-stubs/scp/zstandard/colorama、遮蔽 stdlib 的 py2
# backport argparse、误入 runtime 的 setuptools/wheel,以及随死代码
# (utils.Remote / notify.feishu_send) 一起退役的 paramiko/requests。
# boto3/tqdm 仅 legacy sync 使用、redis 仅回退后端使用 —— 随 Wave 1 决断退役。
dependencies = [
    "boto3>=1.43.16",
    "loguru>=0.7.2",
    "numpy>=2.2.6",
    "psycopg-pool>=3.3.1",
    "psycopg[binary]",
    "pyyaml>=6.0.3",
    "redis>=8.0.0",
    "rich>=15.0.0",
    "tqdm>=4.67.1",
    "xmltodict>=1.0.2",
]

[project.scripts]
ops = "ops.main:main"

[dependency-groups]
dev = [
    "pytest>=8",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
filterwarnings = [
    # psycopg ConnectionPool.__del__ 在 GC 时试图 join 自己的 worker 线程,
    # 短命 store pool (每测新建) 触发无害的 unraisable 噪音。生产是长命进程不涉及。
    "ignore::pytest.PytestUnraisableExceptionWarning",
]
markers = [
    "pg: 需要可达的 ops_test Postgres 库 (host 10.9.100.160:15432); 库不可达时自动 skip",
    "slow: 真跑 gsim 的端到端测试 (慢, 默认不跑)",
    "e2e: 端到端测试 (真实 gsim + cc 数据); 环境不可达时自动 skip",
]

[tool.setuptools.packages.find]
include = ["ops*"]
