[project]
name = "ops"
version = "0.1.1"
description = "Gsim Operations Tool"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "argparse>=1.4.0",
    "boto3>=1.43.16",
    "colorama>=0.4.6",
    "loguru>=0.7.2",
    "lxml>=6.0.2",
    "lxml-stubs>=0.5.1",
    "numpy>=2.2.6",
    "pandas>=2.3.3",
    "paramiko>=4.0.0",
    "pyyaml>=6.0.3",
    "redis>=8.0.0",
    "requests>=2.32.5",
    "rich>=15.0.0",
    "scp>=0.15.0",
    "setuptools>=80.9.0",
    "tqdm>=4.67.1",
    "wheel>=0.45.1",
    "xmltodict>=1.0.2",
    "zstandard>=0.25.0",
]

[project.scripts]
ops = "ops.main:main"

[tool.setuptools.packages.find]
include = ["ops*"]
