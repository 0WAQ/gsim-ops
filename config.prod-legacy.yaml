users:
  wbai: wenbo@graceim.ai
  chaoqun: chaoqun@graceim.ai
  mhe: muyang@graceim.ai

# 基础路径变量 (可通过环境变量覆盖: OPS_GSIM_HOME, OPS_STORAGE, OPS_WORKSPACE)
vars:
  gsim_home: /usr/local/gsim
  storage: /mnt/storage
  workspace: /home/wbai/alpha

# 路径配置
path:
  dropbox_path: ${storage}/dropbox/
  pnl_prod_path: ${gsim_home}/pnl_prod
  pnl_pool_path: ${gsim_home}/pnl_pool
  pnl_alphalib: ${storage}/alphalib/alpha_pnl
  python_path: ${gsim_home}/.venv/bin/python

  pnl_path: ${workspace}/dropbox/pnl
  alpha_path: ${workspace}/dropbox/alpha
  checkpoint_path: ${workspace}/dropbox/checkpoint
  nio_data_path: /datasvc/data/cc_2025

  alpha_src: ${storage}/alphalib/alpha_src
  alpha_dump: ${storage}/alphalib/alpha_dump
  alpha_pnl: ${storage}/alphalib/alpha_pnl
  alpha_feature: ${storage}/alphalib/alpha_feature
  staging: ${storage}/alphalib/staging
  recycle: ${storage}/recycle

  # pnl 按因子来源 (discovery_method) 分流沉淀,入库成功后各拷一份
  pnl_automated: ${storage}/alphalib/pnl_automated
  pnl_manual: ${storage}/alphalib/pnl_manual

# 脚本
script:
  run_script: ${gsim_home}/run_cp.py
  simsummary_script: ${gsim_home}/tools/simsummary.py
  bcorr_script: ${gsim_home}/dataops/bcorr
  feishu_script: /home/wbai/gsim-ops/jiance/feishu_send.py

# TODO:
backtest:
  stats: StatsBench
  thres: 90
  index_ret: aindexeodprices.s_dq_pctchange_000852

# checker
checker:
  # 合规性检测
  compliance:
    enabled: true
    max_position_pct: 0.05  # 个股最大持仓比例 (5%)
    min_total_stocks: 100   # 多空最小持股数量
    min_long_stocks: 50     # 多头最小持股数量
    min_short_stocks: 50    # 空头最小持股数量
    check_window: 762       # 只校验最近 N 个交易日 (约三年),规避早期数据暖机期

  # 断点检测
  checkpoint:
    enabled: true

  # 相关性检测
  correlation:
    enabled: true
    ret%: 10.0
    tvr_d0%: 60.0
    tvr_d1%: 50.0
    shrp: 2.0
    corr_threshold: 0.7     # 相关性阈值 (< 0.7 为低相关)


# 邮件通知配置
notification:
  # 汇总邮件收件人 (可多个)
  summary_emails:
   - wenbo@graceim.ai
   # - yong@graceim.ai

  # 是否发送个人邮件
  send_author_email: false

# 作者邮箱映射
authors:
