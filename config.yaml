# ops 生产默认配置 (2026-06-05 JFS 上线起; `ops <cmd>` 不带 -c 即用本文件)。
#
# alphalib 五条数据路径按同一挂载点引用(2026-07-11 staging 共享化后):
# alpha_src / alpha_pnl / alpha_feature / staging 真在 JuiceFS(共享;staging
# 共享 = 任意机 submit 入队、170 消费 check);唯一本机的是 alpha_dump
# (挂载点下软链 → <挂载点>.local sidecar,dump 大文件有意留本机)。
# 其它路径(dropbox / gsim / /datasvc)本地。三表在 server-160 Postgres。
# (原头部自称 "PoC 不要拿来跑生产" 是文档谎言,2026-07-07 修正。)

users:
  wbai: wenbo@graceim.ai
  chaoqun: chaoqun@graceim.ai
  mhe: muyang@graceim.ai

# 基础路径变量
vars:
  gsim_home: /usr/local/gsim
  storage: /mnt/storage
  workspace: /home/wbai/alpha
  alphalib_root: /tank/vault/alphalib   # JuiceFS 挂载点(hosts 未命中时的缺省)

# 每台机器的差异声明(2026-07-11,ops setup 配套):按本机 hostname 精确匹配,
# 覆盖 vars 同名项。优先级 OPS_* 环境变量 > hosts > vars。命中后同一份
# config 四机零环境变量可用;`ops setup --check` 会报告命中情况。
hosts:
  server-160: { alphalib_root: /tank/vault/alphalib }
  server-150: { alphalib_root: /tank/vault/alphalib }
  intel-workstation-144: { alphalib_root: /storage/vault/alphalib }
  server-170: { alphalib_root: /nvme125/alphalib }   # 2026-07-11 迁移声明(/ext4 → 独立 nvme 盘)

# 路径配置
path:
  dropbox_path: ${storage}/dropbox/
  pnl_prod_path: ${gsim_home}/pnl_prod
  pnl_pool_path: ${gsim_home}/pnl_pool
  pnl_alphalib: ${alphalib_root}/alpha_pnl
  python_path: ${gsim_home}/.venv/bin/python

  pnl_path: ${workspace}/dropbox/pnl
  alpha_path: ${workspace}/dropbox/alpha
  checkpoint_path: ${workspace}/dropbox/checkpoint
  nio_data_path: /datasvc/data/cc_2025

  # 以下五条 + recycle 同挂载点引用;仅 dump 经软链落本机 sidecar(见头注)
  alpha_src: ${alphalib_root}/alpha_src
  alpha_dump: ${alphalib_root}/alpha_dump
  alpha_pnl: ${alphalib_root}/alpha_pnl
  alpha_feature: ${alphalib_root}/alpha_feature
  staging: ${alphalib_root}/staging
  recycle: ${alphalib_root}/recycle

  # pnl 按因子来源 (discovery_method) 分流沉淀,入库成功后各拷一份
  pnl_automated: ${alphalib_root}/pnl_automated
  pnl_manual: ${alphalib_root}/pnl_manual

# 脚本
script:
  run_script: ${gsim_home}/run_cp.py
  simsummary_script: ${gsim_home}/tools/simsummary.py
  bcorr_script: ${gsim_home}/dataops/bcorr
  feishu_script: /home/wbai/gsim-ops/jiance/feishu_send.py

backtest:
  stats: StatsBench
  thres: 90
  index_ret: aindexeodprices.s_dq_pctchange_000852

# checker
checker:
  compliance:
    enabled: true
    max_position_pct: 0.05
    min_total_stocks: 100
    min_long_stocks: 50
    min_short_stocks: 50
    violation_tolerance: 10   # 全史违规日 > 此值才拒(放行早期毛刺,数据定策)
    hard_position_mult: 2.0   # 严重违规线 = max_position_pct × 此倍数(单日超线立即拒,不吃容忍)
    # check_window 已退役(2026-07-16):尾窗 762 的判定基数随数据起始漂移,且漏检
    # 窗外全史违规。改全史每日 + 跳过无效日(缺数据的早期天天然免疫)。别加回来。
  checkpoint:
    enabled: true
  correlation:
    enabled: true
    ret%: 10.0
    tvr_d0%: 60.0
    tvr_d1%: 50.0
    shrp: 2.0
    corr_threshold: 0.7

# 邮件通知 — PoC 不发邮件,避免误打扰
notification:
  summary_emails: []
  send_author_email: false

# 作者邮箱
authors:
  wbai:
    name: wbai
    email: wenbo@graceim.ai
  chaoqun:
    name: chaoqun
    email: chaoqun@graceim.ai
  mhe:
    name: mhe
    email: muyang@graceim.ai
  lzhang:
    name: lzhang
    email: linghao@graceim.ai
  fguo:
    name: fguo
    email: fubin@graceim.ai
  jzhang:
    name: jzhang
    email: junjie@graceim.ai

# 因子日增生产 (归档生产化 + ops produce 驱动共用, docs/design/factor-produce-v3.md)。
# 数据根与 check 分族:check 用 path.nio_data_path=cc_2025 (.meta 冻结 20251231,
# 验证窗口可复现,一字不动);produce 走 170 本机 cc_all (持续日增)。
# 下列路径均为 170 本机事实 (生产只在 170 跑;dataset 沿用现役产线资产,D4);
# 这些值在**归档时写死进 XML**,改 config 只影响此后归档的因子,
# 整改存量须重跑迁移脚本 (scripts/migrate_prod_xml.py)。
produce:
  nio_data_path: /nvme125/datasvc/data/cc_all   # D8;cc_2025 在 170 无权限
  enddate: TODAY              # D3 盘前产 T 日仓位;TODAY-1 仅"只看回测不生产"语义
  startdate: '20110101'       # D2 照抄现役产线
  backdays: 256               # D2/D10;>256 自 20110101 起早于数据起始, gsim 崩
  checkpoint_root: /nvme125/checkpoint      # D4 沿用现役资产, per-factor 子目录
  dump_root: /nvme125/alpha_dump            # D4;combo AlphaLoad 直读, 零改动
  pnl_root: /nvme125/alpha_pnl              # D4/D6;与 alphalib alpha_pnl (check 快照字节源) 隔离
  datasvc_prefix: /nvme125    # 归档改写 REPLACE-② 前缀 (Universe 例外内置, 见设计 §4)
  module_prefix: /mnt/storage/alphalib/alpha_src   # D11 @module 跨机稳定前缀 (四机皆有软链)

# 运行模式
mode:
  max_workers: 4              # PoC 期降低并发,方便观察 IO 行为
  dry_run: false
  timeout: 1800
  dates:
    - '20251030'

# sync 命令与 S3 栈已于 2026-07-07 退役 (Wave 1, docs/remediation/JOURNAL.md F1)。
# 本段仅存 library_id 作 ~/.cache/ops/lib/ 命名空间键 (G-wave 时迁到顶层键)。
sync:
  library_id: alphalib-juicefs

# 因子生命周期 state 真相源 (2026-07-04 从 Redis 迁到 Postgres, 单一真相源)。
# backend: postgres 走 factor_state 表。backend: json 为单机 dev/test 后端
# (~/.cache/ops/lib/<lib>/factor_state.json, fcntl 锁), 不是生产回退 ——
# 2026-07-07 Wave 1 起没有"紧急回退"路径: redis state 后端已删除 (自三表拆分起
# 就与 FactorRecord 不兼容, 是假保险)。注意: redis-sentinel 实例本身是 JFS
# metadata 后端, 与 ops 无关, 不可停 —— 这里删的只是 ops 侧代码与配置。
state:
  backend: postgres
  postgres:
    host: 10.9.100.160
    port: 15432
    dbname: ops
    user: ops
    password_file: /home/wbai/gsim-ops/scripts/postgres/.env
    password_key: OPS_PG_PASSWORD

# derived 段已删除 (2026-07-07 Wave 2, JOURNAL V2): 派生层僵尸表退役,
# metrics/datasources/bcorr 在 factor_snapshot (state.postgres 同库)。
# 生产库清理: scripts/postgres/migrate_drop_derived.sql (手动执行)。
